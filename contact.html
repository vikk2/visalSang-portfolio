      <main class="contact-layout">
        <section class="intro-block reveal">
          <p class="eyebrow">Contact</p>
          <h1>Let’s connect for projects, collaboration, or internships.</h1>
        </section>

        <section class="contact-stack">
          <article class="card reveal delay-1">
            <h2>Contact Details</h2>
            <p>Email: visalsang2698@gmail.com</p>
            <p>GitHub: github.com/vikk22</p>
            <p>LinkedIn: linkedin.com/in/visal-sang</p>
          </article>

          <article class="card reveal delay-2">
            <h2>Quick Message</h2>
            <form class="contact-form">
              <label>
                Name
                <input type="text" placeholder="Your name" />
              </label>
              <label>
                Email
                <input type="email" placeholder="you@example.com" />
              </label>
              <label>
                Message
                <textarea rows="4" placeholder="Write a short message"></textarea>
              </label>
              <button class="button primary" type="submit">Send</button>
            </form>
          </article>
